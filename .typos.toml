# typos-cli configuration
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "go.sum",
    "web/static/fonts/",
    "web/static/css/output.css",
    # Vendored, minified third-party JS (htmx): its mangled identifiers trip the
    # spell checker and are not ours to edit.
    "web/static/js/",
]

[default]
# Enforce US English across ALL files (misspell in golangci-lint only covers
# .go sources; this extends US-spelling enforcement to markdown, comments, and
# everything else typos scans -- e.g. modelling -> modeling, queueing -> queuing).
locale = "en-us"
# Ignore git commit hashes (7-40 hex chars) to avoid false positives on hash substrings.
extend-ignore-re = ["\\b[0-9a-f]{7,40}\\b"]

[default.extend-words]
# ID3v2 frame names are not English words; typos extracts the alpha portion (e.g. TPE from TPE1)
TIT2 = "TIT2"
TPE1 = "TPE1"
TPE = "TPE"
# typos' en-us locale does not flag -logue/-log variants, so enforce the US
# spelling explicitly (the repo standard; the rest of the tree uses "catalog").
catalogue = "catalog"
# The Petit Lyrics API really does spell its field <prefferedLyricsType>. It is a
# wire-protocol identifier, not prose: "correcting" it in the test fixtures would
# make them stop matching the responses they exist to represent.
preffered = "preffered"
