# govulncheck confirms 0 reachable call paths, so the advisory does not affect
# this binary. No expiry: there is no upstream fix to wait for.
reason = "x/crypto/openpgp is unused (only .../argon2 is imported); govulncheck reports 0 reachable, and no fixed version exists"
